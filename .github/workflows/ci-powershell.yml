# CI: PowerShell static analysis (PSScriptAnalyzer).
# Runs on every pull request targeting vnext and on pushes to vnext.
name: ci-powershell

on:
  pull_request:
    branches: [vnext]
  push:
    branches: [vnext]
  workflow_dispatch:

permissions:
  contents: read
  # Required by the `changes` job's paths-filter to read changed files via the
  # PR API on pull_request events.
  pull-requests: read

concurrency:
  group: ci-powershell-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether this push/PR touches PowerShell. The real job is gated on this
  # so it only runs when relevant files change. A skipped required job satisfies
  # branch protection, whereas a path-filtered workflow that never runs would
  # leave a required check pending forever. Do NOT convert this to a trigger-level
  # `paths:` filter while PSScriptAnalyzer is a required check on vnext.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      powershell: ${{ steps.filter.outputs.powershell }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            powershell:
              - '**/*.ps1'
              - '**/*.psm1'
              - '**/*.psd1'
              - '.github/workflows/ci-powershell.yml'

  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.powershell == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -RequiredVersion 1.24.0 -Scope CurrentUser -Force

      # Rule configuration (including documented rule exclusions for this
      # deployment-automation codebase) lives in PSScriptAnalyzerSettings.psd1.
      # Fails the job on any Error- or Warning-severity finding.
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse `
            -Settings ./PSScriptAnalyzerSettings.psd1 `
            -Severity @('Error', 'Warning')

          if ($results) {
            $results |
              Sort-Object Severity, ScriptName, Line |
              Format-Table -AutoSize Severity, RuleName,
                @{ Name = 'File'; Expression = { Resolve-Path -Relative $_.ScriptName } },
                Line, Message |
              Out-String -Width 200 |
              Write-Host
            Write-Host "::error::PSScriptAnalyzer found $($results.Count) issue(s)."
            exit 1
          }

          Write-Host 'PSScriptAnalyzer: no issues found.'
