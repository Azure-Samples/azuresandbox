# CI: documentation checks (markdownlint + lychee link checker).
# Runs on every pull request targeting vnext and on pushes to vnext.
name: ci-docs

on:
  pull_request:
    branches: [vnext]
  push:
    branches: [vnext]
  workflow_dispatch:

permissions:
  contents: read
  # Required by the `changes` job's paths-filter to read changed files via the
  # PR API on pull_request events.
  pull-requests: read

concurrency:
  group: ci-docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether this push/PR touches documentation. The real jobs below are
  # gated on this so they only run when relevant files change. They `needs` this
  # job and are *skipped* (not absent) when nothing matches: a skipped required
  # job satisfies branch protection, whereas a path-filtered workflow that never
  # runs would leave a required check pending forever. Do NOT convert this to a
  # trigger-level `paths:` filter while these checks are required on vnext.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - '**/*.md'
              - '.markdownlint.jsonc'
              - '.markdownlint-cli2.jsonc'
              - '.github/workflows/ci-docs.yml'

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Pinned to match the version the repo's .markdownlint(-cli2).jsonc was
      # validated against. Globs and ignores come from .markdownlint-cli2.jsonc;
      # rule configuration comes from .markdownlint.jsonc.
      - name: Run markdownlint-cli2
        run: npx --yes markdownlint-cli2@0.22.1

  lychee:
    name: lychee (internal links)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' }}
    steps:
      - uses: actions/checkout@v4

      # Offline mode only validates local/relative links (file existence);
      # external URLs are not requested, keeping the check fast and deterministic.
      - name: Link check (offline)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress './**/*.md'
          fail: true
