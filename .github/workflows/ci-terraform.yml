# CI: Terraform checks (formatting + tflint static analysis).
# Runs on every pull request targeting vnext and on pushes to vnext.
name: ci-terraform

on:
  pull_request:
    branches: [vnext]
  push:
    branches: [vnext]
  workflow_dispatch:

permissions:
  contents: read
  # Required by the `changes` job's paths-filter to read changed files via the
  # PR API on pull_request events.
  pull-requests: read

concurrency:
  group: ci-terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether this push/PR touches Terraform. The real jobs below are gated
  # on this so they only run when relevant files change. They are *skipped* (not
  # absent) when nothing matches: a skipped required job satisfies branch
  # protection, whereas a path-filtered workflow that never runs would leave a
  # required check pending forever. Do NOT convert this to a trigger-level
  # `paths:` filter while these checks are required on vnext.
  # Note: .terraform.lock.hcl is intentionally omitted — it is gitignored in this
  # repo and never committed.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            terraform:
              - '**/*.tf'
              - '**/*.tf.json'
              - '**/.tflint.hcl'
              - '.github/workflows/ci-terraform.yml'

  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.terraform == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          # Matches required_version (~> 1.15.7) in terraform.tf.
          terraform_version: 1.15.7
          terraform_wrapper: false

      - name: Check formatting
        run: terraform fmt -check -recursive -diff

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.terraform == 'true' }}
    env:
      # Used by `tflint --init` to download the azurerm ruleset plugin from
      # GitHub releases without hitting unauthenticated rate limits.
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.63.1

      # Each directory that contains a .tflint.hcl may pin a different plugin
      # version, so initialize plugins for every config before linting
      # recursively (`tflint --init` only initializes the current directory).
      - name: Init tflint plugins
        run: |
          for dir in $(find . -name .tflint.hcl -printf '%h\n' | sort -u); do
            echo "tflint --init in $dir"
            tflint --init --chdir="$dir"
          done

      # Recursively lints the root module and every child module.
      - name: Run tflint
        run: tflint --recursive

  validate:
    name: terraform validate
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.terraform == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        # Each entry is a root configuration (has its own provider blocks).
        # Child modules under modules/ and extras/modules/ are validated
        # transitively when the root configs that call them are validated.
        dir:
          - .
          - extras/configurations/rg-devops-iac
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          # Matches required_version (~> 1.15.7) in terraform.tf.
          terraform_version: 1.15.7
          terraform_wrapper: false

      # -backend=false downloads providers/initializes modules without
      # configuring remote state, so validation needs no Azure credentials.
      - name: terraform init (no backend)
        run: terraform init -backend=false -input=false
        working-directory: ${{ matrix.dir }}

      - name: terraform validate
        run: terraform validate -no-color
        working-directory: ${{ matrix.dir }}
